<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KryptaFlow NIDS SOC - Operator Sign Up</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                }
            }
        }
    </script>
    <script>
        // Check and apply theme as early as possible
        (function() {
            const savedTheme = localStorage.getItem('theme');
            const systemPrefersLight = window.matchMedia('(prefers-color-scheme: light)').matches;
            if (savedTheme === 'light' || (!savedTheme && systemPrefersLight)) {
                document.documentElement.classList.add('light');
            } else {
                document.documentElement.classList.remove('light');
            }
        })();
    </script>
    
    <style>
        :root {
            --bg-primary: #0c0e15;
            --bg-card: rgba(20, 21, 34, 0.85);
            --border-color: rgba(255, 255, 255, 0.06);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #8b5cf6;
            --accent-hover: #7c3aed;
            --input-bg: #06070a;
        }
        :root.light {
            --bg-primary: #f1f5f9;
            --bg-card: rgba(255, 255, 255, 0.9);
            --border-color: rgba(0, 0, 0, 0.08);
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --accent: #6d28d9;
            --accent-hover: #5b21b6;
            --input-bg: #ffffff;
        }
        body {
            background-color: var(--bg-primary) !important;
            color: var(--text-primary) !important;
            background-image: none !important;
        }
        .glass-card {
            background: var(--bg-card) !important;
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color) !important;
            box-shadow: 0 15px 35px 0 rgba(0, 0, 0, 0.2) !important;
        }
        .text-slate-100 {
            color: var(--text-primary) !important;
        }
        .text-slate-400 {
            color: var(--text-secondary) !important;
        }
        input[type="text"], input[type="email"], input[type="password"] {
            background-color: var(--input-bg) !important;
            border-color: var(--border-color) !important;
            color: var(--text-primary) !important;
        }
        input[type="text"]:focus, input[type="email"]:focus, input[type="password"]:focus {
            border-color: var(--accent) !important;
        }
        button[type="submit"] {
            background-color: var(--accent) !important;
        }
        button[type="submit"]:hover {
            background-color: var(--accent-hover) !important;
        }
        .border-white\/5 {
            border-color: var(--border-color) !important;
        }
        .text-blue-400 {
            color: var(--accent) !important;
        }
        .text-blue-400:hover {
            color: var(--accent-hover) !important;
        }
        /* Header h1 brand gradient override */
        h1.bg-gradient-to-r {
            background-image: linear-gradient(to right, var(--accent), var(--text-secondary)) !important;
        }
    </style>
</head>
<body class="text-slate-100 font-sans min-h-screen flex items-center justify-center p-6 antialiased">

    <div class="w-full max-w-md flex flex-col gap-6">
        <div class="text-center flex flex-col items-center gap-2">
            <span class="text-4xl">🛡️</span>
            <h1 class="text-2xl font-extrabold tracking-wider bg-gradient-to-r from-blue-400 to-indigo-400 bg-clip-text text-transparent">
                OPERATOR SIGN UP
            </h1>
            <p class="text-xs text-slate-400 font-mono tracking-wider uppercase">Create a secure access account</p>
        </div>

        <div class="glass-card p-8 rounded-2xl flex flex-col gap-6">
            {% if error %}
            <div class="bg-red-500/10 border border-red-500/20 text-red-400 px-4 py-3 rounded-lg text-sm font-semibold flex items-center gap-2">
                <span>❌</span>
                <span>{{ error }}</span>
            </div>
            {% endif %}

            <form action="/register" method="POST" class="flex flex-col gap-5">
                <div class="flex flex-col gap-1.5">
                    <label for="username" class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Username</label>
                    <input type="text" name="username" id="username" value="{{ username_val }}" required
                           class="w-full bg-slate-950/80 border border-white/10 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-blue-500 text-slate-100 placeholder-slate-600"
                           placeholder="Operator Name">
                </div>

                <div class="flex flex-col gap-1.5">
                    <label for="email" class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Email Address</label>
                    <input type="email" name="email" id="email" value="{{ email_val }}" required
                           class="w-full bg-slate-950/80 border border-white/10 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-blue-500 text-slate-100 placeholder-slate-600"
                           placeholder="operator@security.local">
                </div>

                <div class="flex flex-col gap-1.5">
                    <label for="password" class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Password</label>
                    <input type="password" name="password" id="password" required
                           class="w-full bg-slate-950/80 border border-white/10 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-blue-500 text-slate-100 placeholder-slate-600"
                           placeholder="••••••••">
                </div>

                <div class="flex flex-col gap-1.5">
                    <label for="confirm" class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Confirm Password</label>
                    <input type="password" name="confirm" id="confirm" required
                           class="w-full bg-slate-950/80 border border-white/10 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-blue-500 text-slate-100 placeholder-slate-600"
                           placeholder="••••••••">
                </div>

                <button type="submit" 
                        class="w-full bg-blue-500 hover:bg-blue-600 active:bg-blue-700 text-white font-bold py-3 rounded-lg transition tracking-wide text-sm shadow-lg shadow-blue-500/15">
                    Create Operator Account
                </button>
            </form>
            
            <div class="border-t border-white/5 pt-4 text-center">
                <p class="text-xs text-slate-400">
                    Already have an account? 
                    <a href="/login" class="text-blue-400 hover:underline font-semibold ml-1">Back to Sign In</a>
                </p>
            </div>
        </div>
    </div>

</body>
</html>
